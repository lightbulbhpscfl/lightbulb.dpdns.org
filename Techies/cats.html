<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    :root {
      --bg: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      --text: #0f172a;
      --card: rgba(0, 0, 0, 0.05);
      --highlight: #0ea5e9;
      --muted: #475569;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: linear-gradient(135deg, #0f172a, #1e293b);
        --text: #e2e8f0;
        --card: rgba(255, 255, 255, 0.05);
        --highlight: #38bdf8;
        --muted: #94a3b8;
      }
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 80px 20px 20px;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 12px 20px;
      background: var(--card);
      backdrop-filter: blur(12px);
      font-size: 0.9rem;
      color: var(--muted);
      z-index: 1000;
    }

    .breadcrumb-inner {
      max-width: 900px;
      margin: 0 auto;
      white-space: nowrap;
      overflow-x: auto;
    }

    .topbar a {
      color: var(--highlight);
      text-decoration: none;
      font-weight: bold;
    }

    .topbar span {
      margin: 0 6px;
    }

    .container {
      text-align: center;
      max-width: 900px;
      width: 100%;
      padding: 40px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); /* 1.5x larger */
      gap: 20px;
    }

    .gallery-item {
      background: var(--card);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

    footer {
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="breadcrumb-inner" id="breadcrumb"></div>
  </div>

  <div class="container">
    <h1>Cats</h1>

    <div class="gallery-grid">
      <div class="gallery-item"><img src="Images/Cat-1.jpg" alt=Cat"></div>
      <div class="gallery-item"><img src="Images/Cat-2.jpg" alt=Cat"></div>
      <div class="gallery-item"><img src="Images/Cat-3.jpg" alt="Cat"></div>
      <div class="gallery-item"><img src="Images/Cat-4.webp" alt="Cat"></div>
    </div>

    <footer></footer>
  </div>

  <script>
    const breadcrumb = document.getElementById("breadcrumb");
    const path = window.location.pathname.split("/").filter(Boolean);

    let currentPath = "";

    path.forEach((segment, index) => {
      currentPath += "/" + segment;

      const link = document.createElement("a");
      link.href = currentPath;

      let name = decodeURIComponent(segment)
        .replace(/[-_]/g, " ")
        .replace(/\.\w+$/, "");

      name = name.charAt(0).toUpperCase() + name.slice(1);

      link.textContent = name;
      breadcrumb.appendChild(link);

      if (index < path.length - 1) {
        const sep = document.createElement("span");
        sep.textContent = "→";
        breadcrumb.appendChild(sep);
      }
    });

    if (path.length === 0) {
      breadcrumb.textContent = document.title;
    }
  </script>

</body>
</html>
