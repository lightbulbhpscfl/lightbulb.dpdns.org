<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error 404</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* Topbar from Techies */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 12px 20px;
      background: var(--card);
      backdrop-filter: blur(12px);
      font-size: 0.9rem;
      color: var(--muted);
      z-index: 1000;
      box-sizing: border-box;
    }

    .breadcrumb-inner {
      max-width: 900px;
      margin: 0 auto;
      white-space: nowrap;
      overflow-x: auto;
    }

    .topbar a {
      color: var(--highlight);
      text-decoration: none;
      font-weight: bold;
    }

    .topbar span {
      margin: 0 6px;
    }

    /* Push content below the fixed topbar */
    body {
      padding-top: 60px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="breadcrumb-inner" id="breadcrumb"></div>
  </div>

  <div class="container" style="max-width: 700px;">
    <h1>That's a 404!</h1>

    <p>
    You've made it to <a href="../">my website</a>, but that page can't be found. Try adding a file extension, or removing it.
    <br>
      HTTP Error Code: 404
    </p>
    <footer>
      made by Carter Anderson
    </footer>
  </div>

  <script>
    const breadcrumb = document.getElementById("breadcrumb");
    const path = window.location.pathname.split("/").filter(Boolean);

    // Always add root link first
    const rootLink = document.createElement("a");
    rootLink.href = "/";
    rootLink.textContent = window.location.hostname || "Home";
    breadcrumb.appendChild(rootLink);

    let currentPath = "";

    path.forEach((segment, index) => {
      currentPath += "/" + segment;

      const sep = document.createElement("span");
      sep.textContent = "→";
      breadcrumb.appendChild(sep);

      const link = document.createElement("a");
      link.href = currentPath;

      let name = decodeURIComponent(segment)
        .replace(/[-_]/g, " ")
        .replace(/\.\w+$/, "");

      name = name.charAt(0).toUpperCase() + name.slice(1);

      link.textContent = name;
      breadcrumb.appendChild(link);
    });
  </script>

</body>
</html>
