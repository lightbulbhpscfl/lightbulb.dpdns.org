<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Personal Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* Topbar from Techies */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 12px 20px;
      background: var(--card);
      backdrop-filter: blur(12px);
      font-size: 0.9rem;
      color: var(--muted);
      z-index: 1000;
      box-sizing: border-box;
    }

    .breadcrumb-inner {
      max-width: 900px;
      margin: 0 auto;
      white-space: nowrap;
      overflow-x: auto;
    }

    .topbar a {
      color: var(--highlight);
      text-decoration: none;
      font-weight: bold;
    }

    .topbar span {
      margin: 0 6px;
    }

    /* Push content below the fixed topbar */
    body {
      padding-top: 60px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="breadcrumb-inner" id="breadcrumb"></div>
  </div>

  <div class="container" style="max-width: 700px;">
    <h1>Welcome to My Server 🚀</h1>

    <p>
      Hi! This is my website, I made it, and I put it on the internet. It's literally running from a computer at my house. It just has whatever random stuff I decide to add :)
    </p>

    <a class="btn" href="clock.html" style="margin: 10px;">
      Retro clock
    </a>
    <a class="btn" href="dice.html" style="margin: 10px;">
      Roll a dice
    </a>
    <a class="btn" href="encode.html" style="margin: 10px;">
      Secret Encoder
    </a>

    <footer>
      made by Carter Anderson
    </footer>
  </div>

  <script>
    const breadcrumb = document.getElementById("breadcrumb");
    const path = window.location.pathname.split("/").filter(Boolean);

    // Always add root link first
    const rootLink = document.createElement("a");
    rootLink.href = "/";
    rootLink.textContent = window.location.hostname || "Home";
    breadcrumb.appendChild(rootLink);

    let currentPath = "";

    path.forEach((segment, index) => {
      currentPath += "/" + segment;

      const sep = document.createElement("span");
      sep.textContent = "→";
      breadcrumb.appendChild(sep);

      const link = document.createElement("a");
      link.href = currentPath;

      let name = decodeURIComponent(segment)
        .replace(/[-_]/g, " ")
        .replace(/\.\w+$/, "");

      name = name.charAt(0).toUpperCase() + name.slice(1);

      link.textContent = name;
      breadcrumb.appendChild(link);
    });
  </script>

</body>
</html>
