<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HPS Area Light</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <style>
    .video-wrapper {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HPS Area Light</h1>

    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/24KiVu9vJ94?si=ksFOgGXKDIdVyebf"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>
    </div>

    <footer>made by Carter Anderson</footer>
  </div>
</body>
</html>
